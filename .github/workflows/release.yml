name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Run runner tests
        run: npm run test:runner

      - name: Validate Runtime scenarios
        run: npm run test:runtime:dry

      - name: Check release metadata
        run: npm run release:check

      - name: Build release archive
        run: npm run release:build

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=(--verify-tag --generate-notes --title "Studio OS ${GITHUB_REF_NAME}")
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            flags+=(--prerelease)
          else
            flags+=(--latest)
          fi
          gh release create "${GITHUB_REF_NAME}" dist/* "${flags[@]}"
